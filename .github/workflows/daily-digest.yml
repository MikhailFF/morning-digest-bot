name: Daily Digest

on:
  schedule:
    - cron: "*/15 6-8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DIGEST_TIMEZONE: Europe/Moscow
      TELEGRAM_ENABLED: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
      OPENROUTER_SITE_URL: ${{ secrets.OPENROUTER_SITE_URL }}
      OPENROUTER_APP_NAME: ${{ secrets.OPENROUTER_APP_NAME }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STATE_DIR: ${{ github.workspace }}/state
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore digest state
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/state
          key: daily-digest-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            daily-digest-state-${{ github.ref_name }}-

      - name: Run daily digest with retries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$STATE_DIR"
          if [[ -n "${OPENAI_API_KEY:-}" || -n "${OPENROUTER_API_KEY:-}" ]]; then
            export OPENAI_ENABLED=true
          else
            export OPENAI_ENABLED=false
          fi
          export OPENAI_API_BASE="${OPENAI_API_BASE:-https://api.openai.com/v1}"
          export OPENAI_MODEL="${OPENAI_MODEL:-gpt-4.1-mini}"
          export OPENROUTER_MODEL="${OPENROUTER_MODEL:-openai/gpt-4.1-mini}"
          export OPENROUTER_SITE_URL="${OPENROUTER_SITE_URL:-https://github.com/MikhailFF/morning-digest-bot}"
          export OPENROUTER_APP_NAME="${OPENROUTER_APP_NAME:-morning-digest-bot}"
          for attempt in 1 2 3; do
            echo "daily digest attempt ${attempt}"
            if PYTHONPATH=src python3 -m digest_bot.main daily; then
              exit 0
            fi

            if [[ "$attempt" -eq 3 ]]; then
              exit 1
            fi

            sleep $((attempt * 20))
          done

      - name: Save digest state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/state
          key: daily-digest-state-${{ github.ref_name }}-${{ github.run_id }}
